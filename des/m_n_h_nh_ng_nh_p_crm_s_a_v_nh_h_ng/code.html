<body class="h-screen w-screen overflow-hidden text-on-surface">
<main class="flex h-full w-full">

<div class="relative z-10 flex flex-col items-center text-center px-container-padding">
<div class="mb-stack-lg animate-fade-in">
<img alt="Sữa Vĩnh Hưng Logo" class="h-32 w-auto mb-stack-md drop-shadow-xl" src="https://lh3.googleusercontent.com/aida-public/AB6AXuALck2vPufROAPStk22P2ENI-dS0PIK-gaYtrROmrvI13uH3d_obbMRtMi_KjLnBj9GcRCh9xxyQdhLNqaG4KLby6ggYNFwSVi8VFBV9guOH0ndBpjg90cPwARmCJV45qtySsdi_rR7gp3jHM4YLM3ay_VgMb_OOtFxe-hk8VAoKHluqsdGUqMVgalfrdjhOqPnwwBd3mS90yZ_fbsE9U6F4mZ7LSdApjJ9_34SnSLs2uFlruj9cCcVUTB-q1y2pLIhm6846P832DtH"/>
</div>
<h2 class="font-headline-md text-headline-md text-surface-container-lowest font-light tracking-wide max-w-xs leading-relaxed">
                    Hệ thống Quản lý Khách hàng Tập trung
                </h2>
<div class="mt-stack-lg w-16 h-1 bg-primary-fixed-dim rounded-full"></div>
</div>
</section>
<!-- Right Column (60%): Login Form -->
<section class="w-full lg:w-[60%] h-full bg-surface-container-lowest flex flex-center items-center justify-center p-gutter md:p-container-padding">
<div class="w-full max-w-md space-y-stack-lg">
<!-- Mobile Logo (Visible only on small screens) -->
<div class="lg:hidden flex justify-center mb-stack-lg">
<img alt="Sữa Vĩnh Hưng Logo" class="h-16 w-auto" src="https://lh3.googleusercontent.com/aida-public/AB6AXuALck2vPufROAPStk22P2ENI-dS0PIK-gaYtrROmrvI13uH3d_obbMRtMi_KjLnBj9GcRCh9xxyQdhLNqaG4KLby6ggYNFwSVi8VFBV9guOH0ndBpjg90cPwARmCJV45qtySsdi_rR7gp3jHM4YLM3ay_VgMb_OOtFxe-hk8VAoKHluqsdGUqMVgalfrdjhOqPnwwBd3mS90yZ_fbsE9U6F4mZ7LSdApjJ9_34SnSLs2uFlruj9cCcVUTB-q1y2pLIhm6846P832DtH"/>
</div>
<div class="space-y-stack-sm text-center lg:text-left">
<h1 class="font-headline-md text-headline-md text-on-surface">Chào mừng trở lại</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Vui lòng đăng nhập để quản lý hệ thống CRM của bạn.</p>
</div>
<form class="space-y-stack-md" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider block ml-1" for="email">Địa chỉ Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant">mail</span>
<input class="w-full h-10 pl-10 pr-4 bg-surface-container-lowest border border-outline-variant rounded-lg text-body-md custom-input transition-all duration-200" id="email" name="email" placeholder="email@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1">
<div class="flex justify-between items-end">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider block ml-1" for="password">Mật khẩu</label>
<a class="font-label-md text-label-md text-outline hover:text-primary transition-colors cursor-pointer" href="#">Quên mật khẩu?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant">lock</span>
<input class="w-full h-10 pl-10 pr-10 bg-surface-container-lowest border border-outline-variant rounded-lg text-body-md custom-input transition-all duration-200" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center space-x-2 py-1">
<input class="w-4 h-4 text-primary border-outline-variant rounded focus:ring-primary/20" id="remember" type="checkbox"/>
<label class="font-body-md text-body-md text-on-surface-variant" for="remember">Ghi nhớ đăng nhập</label>
</div>
<!-- Primary Button -->
<button class="w-full h-10 bg-primary-container text-surface-container-lowest font-label-md text-label-md rounded-lg hover:bg-primary transition-all duration-300 shadow-sm active:scale-[0.98] uppercase tracking-widest">
                        Đăng nhập hệ thống
                    </button>
<!-- Divider -->
<div class="relative py-4">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant opacity-50"></div>
</div>
<div class="relative flex justify-center text-label-md uppercase">
<span class="bg-surface-container-lowest px-4 text-outline-variant">Hoặc</span>
</div>
</div>
<!-- Google Button -->
<button class="w-full h-10 bg-surface-container-lowest border border-outline-variant text-on-surface font-label-md text-label-md rounded-lg flex items-center justify-center space-x-3 hover:bg-surface-container-low transition-all duration-300 active:scale-[0.98]">
<img alt="Google Logo" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDeldGNDr4TvywkLP4DaAzpDoPgJp3klKrTgb4OKSH485HplLiAFui-oVnOKiZL5ngIIk96YHFL_b0mX6pTkWjpFeiCzBzT6maPLwZsBVmC97Xv5GK29BmcrhZYnf7N6x9bKBo68UQjorcr_APCep18wUmz8ytP9lsgv5UtxKyFtd35oXf-27LsMMi1Mlcs3fdI7CavEQreKi6gg7HAceD-T1wz3aGORJ2M6pHehsgc-CiVJDWAsSbouy5FF-2Hv6Uq6vuIK0vEHXig"/>
<span>Đăng nhập bằng tài khoản Google</span>
</button>
</form>
<div class="pt-stack-lg text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                        Chưa có tài khoản? 
                        <a class="text-primary font-semibold hover:underline decoration-primary/30 underline-offset-4" href="#">Liên hệ quản trị viên</a>
</p>
</div>
</div>
</section>
</main>
<script>
        // Simple micro-interactions
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.parentElement.querySelector('.material-symbols-outlined').style.color = '#1E5E3A';
                });
                input.addEventListener('blur', () => {
                    input.parentElement.querySelector('.material-symbols-outlined').style.color = '#c0c9bf';
                });
            });

            // Toggle password visibility
            const togglePass = document.querySelector('button[type="button"]');
            const passInput = document.getElementById('password');
            if (togglePass && passInput) {
                togglePass.addEventListener('click', () => {
                    const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passInput.setAttribute('type', type);
                    const icon = togglePass.querySelector('.material-symbols-outlined');
                    icon.textContent = type === 'password' ? 'visibility_off' : 'visibility';
                });
            }
        });
    </script>
</body></html>
